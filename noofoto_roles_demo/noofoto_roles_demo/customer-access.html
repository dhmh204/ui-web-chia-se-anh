<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noofoto - Truy cập album</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="album-lock-page">
    <section class="lock-card">
      <img src="./assets/logo.png" alt="Noofoto">
      <p class="kicker">ALBUM RIÊNG TƯ</p>
      <h1>Nhập mật khẩu album</h1>
      <p>Khách hàng không cần đăng nhập tài khoản. Hãy nhập mật khẩu do studio cung cấp để truy cập bộ ảnh.</p>
      <form class="form" action="./customer-album.html">
        <div class="form-group">
          <label>Mật khẩu album</label>
          <input class="input" type="password" placeholder="VD: 12A1-2026">
        </div>
        <button class="btn primary" type="submit">Vào album</button>
      </form>
    </section>
  </main>
</body>
</html>
